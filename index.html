<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href = "styles.css">
    <script defer src="script.js"></script>
    <title>Project Calculator</title>
</head>
<body>
    <div class = "calculator">
        <div class = "display">0</div>
        <div class = "numbers">
            <button>0</button>
            <button>1</button>
            <button>2</button>
        </div>
        <div class = "numbers">
            <button>3</button>
            <button>4</button>
            <button>5</button>
        </div>
        <div class = "numbers">
            <button>6</button>
            <button>7</button>
            <button>8</button>
        </div>
        <div class = "numbers">
            <button>9</button>
        </div>
        <div class = "operators">
            <button>+</button>
            <button>-</button>
            <button>*</button>
            <button>.</button>
        </div>
        <div class = "operators">
            <button>/</button>
            <button>=</button>
            <button>clear</button>
            <button>⌫</button>
        </div>
    </div>

</body>
</html>
